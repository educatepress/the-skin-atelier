name: Daily Auto Content Generation (Blog & X/Threads)

on:
  schedule:
    # 毎日 JST 12:00 (= UTC 03:00)
    - cron: '0 3 * * *'
  workflow_dispatch: # 手動実行ボタンも許可

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Blog Generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SHEETS_QUEUE_ID: ${{ secrets.GOOGLE_SHEETS_QUEUE_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: npx tsx scripts/auto-post-blog.ts

      # X (Twitter) 投稿は auto-post-blog.ts 内で自動生成されるため、
      # 個別ステップは不要（二重生成防止）
