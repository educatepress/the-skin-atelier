name: Site Patrol — Daily Health Check (DISABLED)

# 取締役指示により自動実行を停止 (2026-04-24)
# 画像読み込み失敗の警告がノイズになるため中止
on:
  workflow_dispatch: # 必要時に手動実行のみ可能

jobs:
  patrol:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Site Patrol
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_PATROL_CHANNEL: '#skin-atelier_jp'
        run: npx tsx scripts/patrol/site-patrol.ts
