name: Daily Publisher (Atelier)

# Vercel Hobby cron は best-effort で最大数時間の遅延があるため、
# GitHub Actions で確実に 10:00 JST にトリガーする。
# Vercel endpoint を Bearer 認証で叩く方式（最小差分）。

on:
  schedule:
    - cron: '0 1 * * *'  # 10:00 JST (= 01:00 UTC)
  workflow_dispatch:

concurrency:
  group: daily-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Vercel daily-publisher endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://skin-atelier.jp/api/cron/daily-publisher")

          cat /tmp/response.txt
          echo ""
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ daily-publisher returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "channel": "skin-atelier_jp",
              "text": "🚨 *daily-publisher cron が失敗しました*\nGitHub Actions → Vercel endpoint の呼び出しでエラーが発生。\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
