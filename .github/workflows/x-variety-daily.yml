name: X Variety Daily Posts

# 1日に複数回 X にバイラル型ツイートを自動投稿
# ブログ連動の morning thread (04:00 JST) に加えて、昼・夕方・夜の3回を追加。
# 合計4〜5ポスト/日体制で、Xフォロワー増を狙う。

on:
  schedule:
    # JST 12:00 (UTC 03:00) — 生活密着 (daily) : 昼休みの共感スクロール狙い
    - cron: '0 3 * * *'
    # JST 18:00 (UTC 09:00) — 論文引用 (evidence) : 退勤前の権威インプット
    - cron: '0 9 * * *'
    # JST 21:30 (UTC 12:30) — 夜のスクロール向け (daily / contrast / confession / qa をローテ)
    - cron: '30 12 * * *'

  workflow_dispatch:
    inputs:
      pattern:
        description: 'Pattern type (myth / evidence / contrast / confession / qa / daily / random)'
        required: false
        default: 'random'

concurrency:
  group: x-variety-${{ github.event.schedule || github.event.inputs.pattern }}
  cancel-in-progress: false

jobs:
  post-variety-tweet:
    runs-on: ubuntu-latest
    # Gemini 503 で最大 ~14.5 分のリトライ累計になるため、余裕をもって 20 分
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Determine pattern type
        id: pattern
        run: |
          # Cron time → pattern mapping
          if [ "${{ github.event.schedule }}" = "0 3 * * *" ]; then
            # 昼: 生活密着 (日常シーンから共感 → 保存)
            echo "type=daily" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            # 夕: 論文引用 (退勤前の権威インプット)
            echo "type=evidence" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 12 * * *" ]; then
            # 夜: daily / contrast / confession / qa を曜日でローテ (daily を多めに)
            DAY_OF_YEAR=$(date +%j)
            case $((DAY_OF_YEAR % 4)) in
              0) echo "type=daily" >> $GITHUB_OUTPUT ;;
              1) echo "type=contrast" >> $GITHUB_OUTPUT ;;
              2) echo "type=confession" >> $GITHUB_OUTPUT ;;
              3) echo "type=qa" >> $GITHUB_OUTPUT ;;
            esac
          else
            # Manual dispatch: use input or default to random
            echo "type=${{ github.event.inputs.pattern || 'random' }}" >> $GITHUB_OUTPUT
          fi

      - name: Post X variety tweet
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SHEETS_QUEUE_ID: ${{ secrets.GOOGLE_SHEETS_QUEUE_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: npx tsx scripts/auto-publish/x-variety-single.ts --type=${{ steps.pattern.outputs.type }}
